<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review Discovery Engine</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            accent: "#4f46e5",
          },
        },
      },
    };
  </script>
  <style>
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <div class="flex min-h-screen">
    <!-- History sidebar -->
    <aside
      id="history-sidebar"
      class="w-72 shrink-0 border-r border-slate-200 bg-white flex flex-col p-4 hidden md:flex"
    >
      <div id="history-panel" class="flex flex-col flex-1 min-h-0"></div>
    </aside>

    <!-- Mobile history toggle -->
    <button
      id="history-toggle"
      type="button"
      class="md:hidden fixed bottom-4 left-4 z-20 bg-indigo-600 text-white text-sm font-medium px-4 py-2 rounded-full shadow-lg"
    >
      History
    </button>

    <!-- Main content -->
    <main class="flex-1 overflow-y-auto">
      <div class="max-w-3xl mx-auto px-4 py-12">
        <header class="mb-10 text-center">
          <h1 class="text-3xl font-bold text-slate-900">AI Review Discovery Engine</h1>
          <p class="text-slate-600 mt-2">
            Ask any question about Spotify and get real user feedback from App Store, Play Store, and Reddit.
          </p>
        </header>

        <section class="bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
          <label for="question" class="block text-sm font-medium text-slate-700 mb-2">Your question</label>
          <textarea
            id="question"
            rows="3"
            class="w-full rounded-xl bg-slate-50 border border-slate-300 px-4 py-3 text-slate-900 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
            placeholder="Why do users struggle to discover new music?"
          ></textarea>

          <div class="mt-3 flex flex-wrap gap-2" id="suggested-prompts"></div>

          <div class="mt-5 flex items-center gap-3">
            <button
              id="ask-btn"
              class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-6 py-2.5 rounded-xl transition disabled:opacity-50"
            >
              Ask
            </button>
            <p id="status-text" class="text-sm text-slate-500"></p>
          </div>
        </section>

        <div id="answer-panel" class="hidden mt-6 bg-white border border-slate-200 rounded-2xl p-6 shadow-sm">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold text-slate-900">Answer</h2>
            <p id="answer-meta" class="text-xs text-slate-500"></p>
          </div>
          <div id="answer-text" class="leading-relaxed text-slate-800"></div>
          <div id="evidence-summary"></div>
        </div>

        <div id="citations-panel" class="hidden mt-6">
          <h2 class="text-lg font-semibold text-slate-900 mb-4">Sources</h2>
          <div id="citations-list" class="space-y-3"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Mobile history drawer -->
  <div id="history-drawer" class="md:hidden fixed inset-0 z-30 hidden">
    <div id="history-backdrop" class="absolute inset-0 bg-black/40"></div>
    <aside class="absolute left-0 top-0 bottom-0 w-72 bg-white border-r border-slate-200 p-4 flex flex-col">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-semibold text-slate-700 uppercase tracking-wide">History</h2>
        <button id="history-close" type="button" class="text-slate-400 hover:text-slate-600 text-xl leading-none">&times;</button>
      </div>
      <div id="history-panel-mobile" class="flex flex-col flex-1 min-h-0 overflow-hidden"></div>
    </aside>
  </div>

  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
